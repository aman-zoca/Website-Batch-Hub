<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Batch Hub v3</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-success {
            background-color: #d1fae5;
            color: #065f46;
        }

        .status-failed {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .status-pending {
            background-color: #f3f4f6;
            color: #374151;
        }

        .status-processing {
            background-color: #dbeafe;
            color: #1e40af;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        #log-container {
            max-height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            line-height: 1rem;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

        <!-- Data Injection (Mini-sample for structural reference script will populate fully) -->
        <script id="entities-data" type="application/json">


</script>

        <script>
            // PROXY FOR STATE MANAGEMENT
            const state = new Proxy({
                entities: [],
                total: 0,
                success: 0,
                failed: 0,
                processing: 0,
                isRunning: false,
                currentIndex: 0
            }, {
                set(target, prop, value) {
                    target[prop] = value;
                    if (['success', 'failed', 'processing', 'total'].includes(prop)) updateStats();
                    if (prop === 'entities') saveToStorage();
                    return true;
                }
            });

            const STORAGE_KEY = 'website-batch-v3-data';
            const tableBody = document.getElementById('table-body');
            const logContainer = document.getElementById('log-container');
            const authToken = document.getElementById('auth-token');
            const searchInput = document.getElementById('search-input');
            const progressInfo = document.getElementById('progress-info');

            // INITIALIZATION
            document.addEventListener('DOMContentLoaded', () => {
                loadProgress();
                renderTable();
                updateStats();
                addLog("System ready. LocalStorage persistence active.");
            });

            function saveToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    entities: state.entities,
                    currentIndex: state.currentIndex
                }));
                localStorage.setItem('website-batch-token', authToken.value);
            }

            function loadProgress() {
                const saved = localStorage.getItem(STORAGE_KEY);
                const savedToken = localStorage.getItem('website-batch-token');
                if (savedToken) authToken.value = savedToken;

                if (saved) {
                    const data = JSON.parse(saved);
                    state.entities = data.entities || [];
                    state.currentIndex = data.currentIndex || 0;
                    if (state.entities.length) {
                        addLog(`✨ Resumed progress: ${state.entities.filter(e => e.pubStatus === 'success').length} complete.`);
                    }
                } else {
                    // Initial load from JSON script tag
                    const scriptTag = document.getElementById('entities-data');
                    const content = scriptTag ? scriptTag.textContent.trim() : "";
                    if (content) {
                        try {
                            const raw = JSON.parse(content);
                            state.entities = raw.map((e, i) => ({
                                ...e,
                                id: i,
                                genStatus: 'pending',
                                pubStatus: 'pending',
                                genResponse: '',
                                pubResponse: ''
                            }));
                        } catch (e) {
                            addLog("⚠️ Injected JSON is invalid or empty. Use 'Import' button.");
                        }
                    }
                }
                state.total = state.entities.length;
            }

            function updateStats() {
                document.getElementById('stat-total').textContent = state.total;
                document.getElementById('stat-success').textContent = state.entities.filter(e => e.pubStatus === 'success').length;
                document.getElementById('stat-failed').textContent = state.entities.filter(e => e.genStatus === 'failed' || e.pubStatus === 'failed').length;
                document.getElementById('stat-processing').textContent = state.processing;

                const doneCount = state.entities.filter(e => e.pubStatus === 'success').length;
                if (progressInfo) progressInfo.textContent = `Progress: ${doneCount} / ${state.total}`;
            }

            function renderTable(filter = '') {
                const currentFilter = filter.toLowerCase();
                const rows = state.entities.map((e, idx) => {
                    if (currentFilter && !e.url.includes(currentFilter) && !e.entity_id.includes(currentFilter)) return '';

                    return `
                    <tr class="group hover:bg-slate-50/80 transition-colors border-b border-slate-50">
                        <td class="px-6 py-4 text-[10px] font-bold text-slate-400 text-center">${idx}</td>
                        <td class="px-6 py-4">
                            <div class="flex flex-col">
                                <a href="https://${e.url}" target="_blank" class="text-sm font-bold text-slate-700 hover:text-blue-600 transition-colors truncate max-w-[240px] underline decoration-slate-200">${e.url}</a>
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] text-slate-400 font-mono tracking-tighter uppercase mt-0.5">${e.entity_id.substring(0, 8)}...</span>
                                    <button onclick="copyToClipboard(${idx})" class="p-1 hover:bg-slate-200 rounded" title="Copy Row Data">
                                        <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex items-center justify-center gap-1.5 font-black text-[9px] uppercase">
                                <span class="status-${e.genStatus} px-2 py-0.5 rounded-md min-w-[50px]">${e.genStatus}</span>
                                <span class="text-slate-300">→</span>
                                <span class="status-${e.pubStatus} px-2 py-0.5 rounded-md min-w-[50px]">${e.pubStatus}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex gap-1.5">
                                <button onclick="manualAction(${idx}, 'generate')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white p-1.5 rounded-lg transition-all" title="Manual Generate">
                                    <span class="text-xs">🚀</span>
                                </button>
                                <button onclick="manualAction(${idx}, 'publish')" class="bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white p-1.5 rounded-lg transition-all" title="Manual Publish">
                                    <span class="text-xs">📤</span>
                                </button>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-[10px] text-slate-500 font-mono line-clamp-1 max-w-[150px]" title="${e.genResponse || 'No response yet'}">
                                ${e.genResponse || '-'}
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-[10px] text-slate-500 font-mono line-clamp-1 max-w-[150px]" title="${e.pubResponse || 'No response yet'}">
                                ${e.pubResponse || '-'}
                            </div>
                        </td>
                    </tr>
                `;
                }).join('');
                tableBody.innerHTML = rows;
            }

            function addLog(msg) {
                const time = new Date().toLocaleTimeString();
                const div = document.createElement('div');
                div.className = "flex gap-2 mb-1";
                div.innerHTML = `<span class="text-slate-600 font-bold">${time}</span> <span class="text-slate-100">${msg}</span>`;
                logContainer.appendChild(div);
                logContainer.scrollTop = logContainer.scrollHeight;
            }

            // Search logic
            searchInput.addEventListener('input', (e) => renderTable(e.target.value));

            // Legacy cycle removed - replaced by runPipeline

            async function performAction(index, action) {
                const e = state.entities[index];
                const isGen = action === 'generate';

                const url = isGen
                    ? 'https://internal.zoca.ai/internal/api/v1/website/creation/generate/website'
                    : 'https://internal.zoca.ai/internal/api/v1/website/creation/build/website';

                const body = isGen
                    ? { entityId: e.entity_id, refreshAll: false, homeSectionsToUpdate: [] }
                    : { websiteId: e.website_id };

                if (isGen) e.genStatus = 'processing'; else e.pubStatus = 'processing';
                state.processing += 1;
                renderTableRow(index); // Refresh only UI for this row

                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'accept': '*/*',
                            'authorization': authToken.value.trim(),
                            'content-type': 'application/json',
                            'origin': 'https://raft.zoca.ai',
                            'x-ops-request': 'true'
                        },
                        body: JSON.stringify(body)
                    });

                    const data = await res.text();
                    const status = res.status;
                    const statusTxt = res.ok ? 'success' : 'failed';
                    const respSnippet = `[${status}] ${data.substring(0, 80)}`;

                    if (isGen) {
                        e.genStatus = statusTxt;
                        e.genResponse = respSnippet;
                    } else {
                        e.pubStatus = statusTxt;
                        e.pubResponse = respSnippet;
                    }

                    addLog(`${res.ok ? '✅' : '❌'} ${action} ${e.url} (${status})`);
                } catch (err) {
                    if (isGen) { e.genStatus = 'failed'; e.genResponse = err.message; }
                    else { e.pubStatus = 'failed'; e.pubResponse = err.message; }
                    addLog(`🔥 AJAX Error: ${err.message}`);
                }

                state.processing -= 1;
                state.entities = [...state.entities]; // Trigger Proxy save
                renderTableRow(index);
            }

            // Efficient partial render
            function renderTableRow(idx) {
                const filter = searchInput.value.toLowerCase();
                const e = state.entities[idx];
                if (filter && !e.url.includes(filter)) return;
                renderTable(filter);
            }

            async function manualAction(idx, action) {
                if (!authToken.value.trim()) { alert("Please enter token first!"); return; }
                addLog(`🛠️ Manual ${action} for ${state.entities[idx].url}`);
                await performAction(idx, action);
            }

            function copyToClipboard(idx) {
                const e = state.entities[idx];
                const text = `Index: ${idx}\nURL: ${e.url}\nEntity ID: ${e.entity_id}\nWebsite ID: ${e.website_id}\nGen Status: ${e.genStatus}\nPub Status: ${e.pubStatus}\nGen Resp: ${e.genResponse}\nPub Resp: ${e.pubResponse}`;
                navigator.clipboard.writeText(text).then(() => {
                    addLog(`📋 Copied details for ${e.url}`);
                });
            }

            // Parallel Batch Logic
            let isGenActive = false;
            let isPubActive = false;

            document.getElementById('gen-batch-btn').addEventListener('click', async () => {
                if (isGenActive) { isGenActive = false; updateGenBtnStatus(); return; }
                if (!authToken.value.trim()) { alert("Token required!"); return; }
                isGenActive = true;
                updateGenBtnStatus();
                await runPipeline('generate');
            });

            document.getElementById('pub-batch-btn').addEventListener('click', async () => {
                if (isPubActive) { isPubActive = false; updatePubBtnStatus(); return; }
                if (!authToken.value.trim()) { alert("Token required!"); return; }
                isPubActive = true;
                updatePubBtnStatus();
                await runPipeline('publish');
            });

            function updateGenBtnStatus() {
                const btn = document.getElementById('gen-batch-btn');
                const indicator = document.getElementById('gen-indicator');
                if (isGenActive) {
                    btn.classList.replace('bg-blue-600', 'bg-rose-500');
                    btn.innerHTML = '⏸️ Pause Gen';
                    indicator.className = 'w-2 h-2 rounded-full bg-blue-500 animate-pulse';
                } else {
                    btn.classList.replace('bg-rose-500', 'bg-blue-600');
                    btn.innerHTML = '🚀 Run Gen Batch';
                    indicator.className = 'w-2 h-2 rounded-full bg-slate-300';
                }
            }

            function updatePubBtnStatus() {
                const btn = document.getElementById('pub-batch-btn');
                const indicator = document.getElementById('pub-indicator');
                if (isPubActive) {
                    btn.classList.replace('bg-emerald-600', 'bg-rose-500');
                    btn.innerHTML = '⏸️ Pause Pub';
                    indicator.className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse';
                } else {
                    btn.classList.replace('bg-rose-500', 'bg-emerald-600');
                    btn.innerHTML = '📤 Run Pub Batch';
                    indicator.className = 'w-2 h-2 rounded-full bg-slate-300';
                }
            }

            async function runPipeline(action) {
                const isGen = action === 'generate';
                const from = parseInt(document.getElementById(isGen ? 'gen-from' : 'pub-from').value);
                const to = parseInt(document.getElementById(isGen ? 'gen-to' : 'pub-to').value);
                const size = parseInt(document.getElementById(isGen ? 'gen-batch-size' : 'pub-batch-size').value);
                const delay = parseInt(document.getElementById(isGen ? 'gen-delay' : 'pub-delay').value) * 1000;

                addLog(`🚀 Starting ${action} pipeline: ${from} to ${to} (delay: ${delay / 1000}s)`);

                for (let i = from; i < to; i += size) {
                    if (isGen ? !isGenActive : !isPubActive) break;
                    const end = Math.min(i + size, to);

                    addLog(`⚙️ Processing ${action} batch: ${i} to ${end - 1}`);

                    for (let j = i; j < end; j++) {
                        if (isGen ? !isGenActive : !isPubActive) break;
                        // Only process if not success or manually forced
                        if (state.entities[j] && state.entities[j][isGen ? 'genStatus' : 'pubStatus'] !== 'success') {
                            await performAction(j, action);

                            // Wait for delay AFTER processing each item
                            if (delay > 0) {
                                addLog(`⏳ Waiting ${delay / 1000}s before next item...`);
                                for (let sec = delay / 1000; sec > 0; sec--) {
                                    if (isGen ? !isGenActive : !isPubActive) break;
                                    await new Promise(r => setTimeout(r, 1000));
                                }
                            }
                        }
                    }

                    if (isGen ? !isGenActive : !isPubActive) break;
                    addLog(`✅ ${action} batch done: ${i}-${end - 1}`);
                    if (isGen && end % 50 === 0) triggerAutoDownload();
                }

                if (isGen) { isGenActive = false; updateGenBtnStatus(); } else { isPubActive = false; updatePubBtnStatus(); }
                addLog(`🏁 ${action} pipeline finished/paused.`);
            }

            // Import logic
            document.getElementById('import-json').addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function (evt) {
                    try {
                        let raw = [];
                        if (file.name.endsWith('.json')) {
                            raw = JSON.parse(evt.target.result);
                        } else if (file.name.endsWith('.csv')) {
                            // Very simple CSV parser
                            const lines = evt.target.result.split('\n');
                            const headers = lines[0].split(',');
                            raw = lines.slice(1).filter(l => l.trim()).map(line => {
                                const values = line.split(',');
                                const obj = {};
                                headers.forEach((h, i) => obj[h.trim()] = values[i]?.trim());
                                return obj;
                            });
                        }

                        state.entities = raw.map((e, i) => ({
                            ...e,
                            genStatus: e.gen_status || e.genStatus || 'pending',
                            pubStatus: e.pub_status || e.pubStatus || 'pending',
                            genResponse: e.gen_response || e.genResponse || '',
                            pubResponse: e.pub_response || e.pubResponse || ''
                        }));
                        state.total = state.entities.length;
                        document.getElementById('gen-to').value = state.total;
                        document.getElementById('pub-to').value = state.total;
                        renderTable();
                        saveToStorage();
                        addLog(`✨ Imported ${state.total} records.`);
                    } catch (err) {
                        alert("Import failed: " + err.message);
                    }
                };
                reader.readAsText(file);
            });

            function triggerAutoDownload() {
                addLog("📥 Triggering auto-export...");
                downloadCSV(`auto_batch_${Date.now()}.csv`);
            }

            function downloadCSV(filename) {
                let csv = "entity_id,website_id,url,gen_status,pub_status,gen_response,pub_response\n";
                state.entities.forEach(e => {
                    const genR = e.genResponse || "-";
                    const pubR = e.pubResponse || "-";
                    csv += `${e.entity_id},${e.website_id},${e.url},${e.genStatus},${e.pubStatus},"${genR.replace(/"/g, '""')}","${pubR.replace(/"/g, '""')}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename || 'results.csv';
                a.click();
            }

            document.getElementById('download-csv').onclick = () => downloadCSV('full_results_export.csv');
            document.getElementById('clear-log').onclick = () => logContainer.innerHTML = '';
            document.getElementById('clear-progress').onclick = () => {
                if (confirm("Reset all progress? This will clear local data and records.")) {
                    localStorage.removeItem(STORAGE_KEY);
                    state.entities = [];
                    state.total = 0;
                    renderTable();
                    location.reload();
                }
            };
        </script>
</body>

</html>
